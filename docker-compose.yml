services:
  app:
    image: '${APP_IMAGE:-my-pharmacy-depo-service}:${APP_TAG:-latest}'
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my-pharmacy-depo-service
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_ACCESS_EXPIRATION=${JWT_ACCESS_EXPIRATION:-15m}
      - FRONTEND_URL=${FRONTEND_URL:-}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - internal_net

networks:
  internal_net:
    external: true
